<script>
function getToken(){ return localStorage.getItem('token') || ''; }
function q(name){ return new URLSearchParams(location.search).get(name); }
let currentUser = null;
let lessonMap = new Map();

async function loadCurrentUser(){
  try{
    const res = await fetch('/api/me', {
      headers: { 'Authorization': `Bearer ${getToken()}` }
    });
    const data = await res.json().catch(()=>null);
    if(res.ok && data && data.success){
      currentUser = data.user || data || null;
      return;
    }
  }catch(_){}
  currentUser = null;
}

function canImportLessonToCourse(lesson){
  const role = String(currentUser?.role || '').toLowerCase();
  if (role === 'admin') return true;
  if (role !== 'teacher') return false;
  const meId = String(currentUser?._id || currentUser?.id || '');
  const hostId = String(lesson?.host?.userId || '');
  return !!(meId && hostId && meId === hostId);
}

async function addLessonToCourse(lessonId){
  const lesson = lessonMap.get(String(lessonId));
  if(!lesson || !lesson.recordingUrl){
    alert('Bu darsda yozuv topilmadi.');
    return;
  }

  const titleDefault = String(lesson.title || 'Recorded lesson').trim() || 'Recorded lesson';
  const title = prompt('Kurs nomi:', titleDefault);
  if(title === null) return;
  const cleanTitle = String(title || '').trim();
  if(!cleanTitle){
    alert('Kurs nomi bo‘sh bo‘lmasin.');
    return;
  }

  const modeInput = prompt("Kurs turi: free yoki paid", "free");
  if(modeInput === null) return;
  const type = String(modeInput || '').trim().toLowerCase() === 'paid' ? 'paid' : 'free';

  let price = 0;
  if(type === 'paid'){
    const p = prompt("Narx (so'm):", "49000");
    if(p === null) return;
    const val = Number(String(p).replace(/[^\d]/g, ''));
    if(!Number.isFinite(val) || val < 1){
      alert("Narx 1 so'mdan katta bo‘lishi kerak.");
      return;
    }
    price = Math.round(val);
  }

  const payload = {
    lessonId: String(lessonId),
    title: cleanTitle,
    description: `Imported from group lesson: ${titleDefault}`,
    type,
    status: 'draft',
    pricingCurrency: 'UZS',
    freeForSourceGroup: true
  };
  if(type === 'paid') payload.price = price;

  const res = await fetch('/api/courses/from-group-lesson', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${getToken()}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok || !data?.success){
    alert(data?.error || `Kursga qo‘shib bo‘lmadi (HTTP ${res.status})`);
    return;
  }

  const courseId = String(data?.course?._id || '');
  alert("Dars kursga qo‘shildi (draft).");
  if(courseId){
    window.open(`/course.html?id=${encodeURIComponent(courseId)}`, '_blank');
  }
}

function resolveBackLink(){
  const groupId = q('groupId');
  const ret = q('return');
  const back = document.getElementById('backLink');
  const retInfo = document.getElementById('retInfo');

  // Show short info
  try{ retInfo.textContent = ret ? 'return=1' : 'return=0'; }catch(e){}

  // Priority:
  // 1) explicit return param (coming from group.html / group01)
  // 2) fallback to group page by id
  // 3) fallback groups list
  if (ret) {
    try{
      const decoded = decodeURIComponent(ret);
      back.href = decoded;
      back.title = 'Oldingi sahifaga qaytish';
      return;
    }catch(e){}
  }
  if (groupId) {
    back.href = `/group.html?id=${encodeURIComponent(groupId)}`;
    back.title = 'Shu guruh chatiga qaytish';
  } else {
    back.href = '/groups.html';
    back.title = 'Guruhlar ro‘yxati';
  }
}

function fmt(d){
  if(!d) return '—';
  const x=new Date(d);
  return x.toLocaleString([], {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDur(sec){
  sec = Number(sec||0);
  const m=Math.floor(sec/60), s=sec%60;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

function probeVideoDurationSec(url){
  return new Promise((resolve) => {
    try {
      if (!url) return resolve(0);
      const v = document.createElement('video');
      let done = false;
      const finish = (sec) => {
        if (done) return;
        done = true;
        try { v.pause(); } catch (_) {}
        try { v.removeAttribute('src'); v.load(); } catch (_) {}
        resolve(Math.max(0, Math.round(Number(sec || 0))));
      };
      const onMeta = () => {
        const sec = Number(v.duration || 0);
        if (Number.isFinite(sec) && sec > 0) finish(sec);
      };
      v.preload = 'metadata';
      v.muted = true;
      v.playsInline = true;
      v.addEventListener('loadedmetadata', onMeta, { once: true });
      v.addEventListener('durationchange', onMeta);
      v.addEventListener('error', () => finish(0), { once: true });
      setTimeout(() => finish(0), 8000);
      v.src = url;
      try { v.load(); } catch (_) {}
    } catch (_) {
      resolve(0);
    }
  });
}

function attachLessonDurationHooks(cardEl, lesson){
  try {
    if (!cardEl || !lesson) return;
    const lessonId = String(lesson._id || '');
    const videoDurEl = cardEl.querySelector(`[data-video-duration="${lessonId}"]`);
    if (!videoDurEl) return;

    const dbDuration = Math.max(0, Math.round(Number(lesson.recordingDurationSec || 0)));
    if (dbDuration > 0) {
      videoDurEl.textContent = fmtDur(dbDuration);
      return;
    }
    if (!lesson.recordingUrl) return;

    const setDuration = (sec) => {
      const s = Math.max(0, Math.round(Number(sec || 0)));
      if (s > 0) videoDurEl.textContent = fmtDur(s);
    };

    const player = cardEl.querySelector('video');
    if (player) {
      const applyFromPlayer = () => {
        const sec = Number(player.duration || 0);
        if (Number.isFinite(sec) && sec > 0) setDuration(sec);
      };
      player.addEventListener('loadedmetadata', applyFromPlayer, { once: true });
      player.addEventListener('durationchange', applyFromPlayer);
      setTimeout(applyFromPlayer, 1200);
    }

    probeVideoDurationSec(toPlayableUrl(lesson.recordingUrl))
      .then((sec) => setDuration(sec))
      .catch(() => {});
  } catch (_) {}
}

async function showAttendance(lessonId){
  try{
    const modal=document.getElementById('attModal');
    const body=document.getElementById('attBody');
    body.innerHTML='Yuklanmoqda...';
    modal.classList.remove('hidden');
    modal.classList.add('flex');

    const res = await fetch(`/api/group-lessons/${lessonId}/attendance`, {
      headers: { 'Authorization': `Bearer ${getToken()}` }
    });
    if(!res.ok){
      body.innerHTML = `<div class="muted">Davomatni ko‘rsatib bo‘lmadi (HTTP ${res.status}). Bu funksiya faqat o‘qituvchi (host) uchun.</div>`;
      return;
    }
    const data = await res.json();
    const joined = data.joined||[];
    const absent = data.absent||[];

    const jRows = joined.map(x => `<tr class="border-b border-white/10">
      <td class="py-1 pr-2">${x.fullName||x.username||x.userId}</td>
      <td class="py-1 pr-2 text-xs muted">${fmt(x.joinedAt)}</td>
      <td class="py-1 pr-2 text-xs muted">${fmt(x.leftAt)}</td>
      <td class="py-1 text-xs">${fmtDur(x.durationSec||0)}</td>
    </tr>`).join('');

    const aRows = absent.map(x => `<li class="py-0.5">${x.fullName||x.username||x.userId}</li>`).join('');

    body.innerHTML = `
      <div class="text-xs muted mb-2">Kirdi: <b>${joined.length}</b> • Kirmadi: <b>${absent.length}</b></div>
      <div class="glass p-3" style="box-shadow:none;border-radius:18px">
        <table class="w-full text-sm">
          <thead class="muted">
            <tr>
              <th class="text-left py-1 pr-2">Ism</th>
              <th class="text-left py-1 pr-2">Kirdi</th>
              <th class="text-left py-1 pr-2">Chiqdi</th>
              <th class="text-left py-1">Davomiylik</th>
            </tr>
          </thead>
          <tbody>${jRows || `<tr><td class="py-2 muted2" colspan="4">Hech kim kirmagan</td></tr>`}</tbody>
        </table>
      </div>
      <div class="mt-3">
        <div class="font-semibold mb-1">Kirmagan talabalar</div>
        <ul class="text-sm muted">${aRows || '<li class="muted2">Yo‘q</li>'}</ul>
      </div>
    `;
  }catch(e){
    console.error(e);
    const body=document.getElementById('attBody');
    body.innerHTML = `<div class="muted">Xatolik: ${e?.message||e}</div>`;
  }
}
document.getElementById('attClose').addEventListener('click', ()=>{
  const modal=document.getElementById('attModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
});


function toDownloadUrl(url){
  try{
    if(!url) return url;

    // Local recordings: use server download proxy (adds Content-Disposition).
    if(url.startsWith('/uploads/lessons/')){
      return '/api/group-lessons/download?url=' + encodeURIComponent(url);
    }

    // Cloudinary: build attachment MP4 URL
    if(url.includes('res.cloudinary.com') && url.includes('/video/upload/')){
      const marker = '/video/upload/';
      const i = url.indexOf(marker);
      const prefix = url.slice(0, i + marker.length);
      let rest = url.slice(i + marker.length);

      const parts = rest.split('/');
      const vIndex = parts.findIndex(p => /^v\d+$/.test(p));
      if(vIndex > 0) parts.splice(0, vIndex);
      rest = parts.join('/');

      rest = rest.replace(/\.[a-zA-Z0-9]+($|\?)/, '.mp4$1');

      const transform = 'fl_attachment,q_auto,f_mp4/';
      return prefix + transform + rest;
    }

    return url;
  }catch(_){ return url; }
}

function toPlayableUrl(url){
  try{
    if(!url) return url;

    // Local recordings served by our server: keep as-is (supports Range).
    if(url.startsWith('/uploads/lessons/')) return url;

    // Cloudinary: prefer MP4 derived URL (more compatible than WebM).
    if(url.includes('res.cloudinary.com') && url.includes('/video/upload/')){
      const marker = '/video/upload/';
      const i = url.indexOf(marker);
      const prefix = url.slice(0, i + marker.length);
      let rest = url.slice(i + marker.length); // may include transforms and/or version segment

      // Strip existing transforms if any (keep from first /v123... segment)
      const parts = rest.split('/');
      const vIndex = parts.findIndex(p => /^v\d+$/.test(p));
      if(vIndex > 0) parts.splice(0, vIndex);
      rest = parts.join('/');

      // Convert filename extension to .mp4
      rest = rest.replace(/\.[a-zA-Z0-9]+($|\?)/, '.mp4$1');

      // Use safe transforms only (vc_auto can 400 on some accounts/files)
      const transform = 'q_auto,f_mp4/';
      return prefix + transform + rest;
    }
    return url;
  }catch(_){ return url; }
}


async function downloadRecording(url, fallbackName){
  if(!url) return;
  const dl = toDownloadUrl(url);
  const a = document.createElement('a');
  a.href = dl;
  a.download = fallbackName || '';
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function load(){
  resolveBackLink();
  await loadCurrentUser();

  const groupId = q('groupId');
  document.getElementById('gid').textContent = groupId || '—';
  if(!groupId){
    document.getElementById('msg').innerHTML = 'URLga <code>?groupId=...</code> qo‘shing.';
    return;
  }

  document.getElementById('msg').textContent = 'Yuklanmoqda...';
  const res = await fetch(`/api/group-lessons?groupId=${encodeURIComponent(groupId)}`, {
    headers: { 'Authorization': `Bearer ${getToken()}` }
  });

  if(!res.ok){
    document.getElementById('msg').textContent = 'Xatolik: ' + res.status;
    return;
  }

  const data = await res.json();
  const list = document.getElementById('list');
  list.innerHTML = '';
  lessonMap = new Map();
  const lessons = data.lessons || [];
  document.getElementById('msg').textContent = lessons.length ? `${lessons.length} ta dars topildi` : 'Hali dars yozuvlari yo‘q';

  lessons.forEach(l => {
    lessonMap.set(String(l._id), l);
    const div = document.createElement('div');
    div.className = 'lessonCard p-4 sm:p-5';

    const safeName = ((l.title||'lesson')+'').replace(/[^a-z0-9_-]+/gi,'_').slice(0,40);

    const rec = l.recordingUrl
      ? `
        <div class="w-full max-w-[520px]">
          <video class="w-full rounded-2xl border border-white/10 bg-black/30" controls preload="metadata" src="${toPlayableUrl(l.recordingUrl)}"></video>
          <div class="mt-2 flex gap-2 flex-wrap">
            <a class="btn btn-primary" href="${l.recordingUrl}" target="_blank" rel="noreferrer">▶ Ochish</a>
            <button class="btn" onclick="downloadRecording('${l.recordingUrl}', '${safeName}')">⬇ Yuklab olish</button>
          </div>
          <div class="text-xs muted2 mt-1">Agar video o‘ynamasa: “Ochish” ni bosib alohida tabda ko‘ring.</div>
        </div>`
      : `<span class="chip">Yozuv yo‘q</span>`;
    const importBtn = (l.recordingUrl && canImportLessonToCourse(l))
      ? `<button class="btn btn-primary" onclick="addLessonToCourse('${l._id}')">🎓 Kursga qo‘shish</button>`
      : '';

    const title = (l.title && String(l.title).trim()) ? String(l.title).trim() : 'Live dars';

    div.innerHTML = `
      <div class="flex items-start justify-between gap-3 flex-wrap">
        <div class="min-w-[260px]">
          <div class="text-lg sm:text-xl font-extrabold">${title}</div>
          <div class="text-xs muted mt-1">
            Teacher: <span class="font-semibold">${l.host?.fullName || 'Teacher'}</span>
            • Boshlanish: ${fmt(l.startedAt)} • Tugash: ${fmt(l.endedAt)}
          </div>

          <div class="kpi">
            <span class="chip">Live: <span data-live-duration="${l._id}">${fmtDur(l.liveDurationSec || 0)}</span></span>
            <span class="chip">Video: <span data-video-duration="${l._id}">${fmtDur(l.recordingDurationSec || 0)}</span></span>
            <span class="chip">Rejim: ${l.mode || 'camera'}</span>
            <span class="chip">Status: ${l.status || '—'}</span>
          </div>
        </div>

        <div class="text-sm flex gap-2 items-center flex-wrap justify-end">
          ${rec}
          ${importBtn}
          <button class="btn" onclick="showAttendance('${l._id}')">📋 Davomat</button>
        </div>
      </div>
    `;
    list.appendChild(div);

    attachLessonDurationHooks(div, l);
  });
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
  <script src="/ui-actions-menu.js" defer></script>
  <script src="/global-assistant.js" defer></script>
</body>
